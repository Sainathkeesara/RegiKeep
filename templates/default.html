<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOps Engineer Practice</title>
    <style>
        body {
            background-color: #1a1a1a;  /* Dark gray background */
            color: #ff6666;  /* Light red text color */
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            height: 100vh;
        }

        .content {
            max-width: 600px;
            text-align: center;
            margin-bottom: 20px;
        }

        .login-buttons {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .login-button {
            padding: 10px;
            background-color: #ff6666;  /* Light red background for buttons */
            color: #1a1a1a;  /* Dark gray text color */
            text-decoration: none;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>This website is used for DevOps Engineers</h1>
        <p>To practice questions and improve their skills.</p>
    </div>

    <div class="login-buttons">
        <button class="login-button" onclick="redirectToUserLogin()">User Login</button>
        <button class="login-button" onclick="redirectToAdminLogin()">Admin Login</button>
    </div>

    <script>
        function redirectToUserLogin() {
            window.location.href = '/login';
        }

        function redirectToAdminLogin() {
            window.location.href = '/admin_login';
        }
    </script>
</body>
</html>
