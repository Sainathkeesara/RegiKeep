services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: regikeep/rgk:latest
    container_name: regikeep-backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - rgk-data:/data
    env_file:
      - .env
    environment:
      - DB_PATH=/data/regikeep.db
      - LISTEN_ADDR=:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: regikeep/ui:latest
    container_name: regikeep-frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    environment:
      - VITE_SUPABASE_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy

volumes:
  rgk-data:
    driver: local
